name: Pattern Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pattern:
          - foundational_design_patterns/5_tool_use
          - foundational_design_patterns/6_planning
          - foundational_design_patterns/7_multi_agent_collaboration
          - foundational_design_patterns/9_rag
          - orchestration/mcp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run smoke test
        working-directory: ${{ matrix.pattern }}
        run: |
          uv sync
          uv run pytest -q tests/test_smoke.py
